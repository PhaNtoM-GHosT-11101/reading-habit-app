<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#000000" id="themeColor"/>
  <title>PageHabit Zen</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
/* ═══ ZEN TOKENS ═══ */
:root {
  --bg: #000000;
  --text: #ffffff;
  --text-muted: #666666;
  --text-faint: #333333;
  --accent: #ffffff;
  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --font-ui: 'Inter', sans-serif;
  --font-read: 'Lora', Georgia, serif;
}
[data-theme="light"] {
  --bg: #ffffff;
  --text: #111111;
  --text-muted: #888888;
  --text-faint: #cccccc;
  --accent: #000000;
}
[data-theme="sepia"] {
  --bg: #f4ecd8;
  --text: #5b4636;
  --text-muted: #9e8e7a;
  --text-faint: #d5ccba;
  --accent: #d35400;
}
[data-theme="eink"] {
  --bg: #e0e0e0;
  --text: #1a1a1a;
  --text-muted: #6a6a6a;
  --text-faint: #a0a0a0;
  --accent: #000000;
}

/* ═══ RESET ═══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{
  font-family:var(--font-ui);
  color:var(--text);font-size:16px;
  transition:background 0.4s ease,color 0.4s ease;
  -webkit-font-smoothing:antialiased;
}
button{font-family:var(--font-ui);background:none;border:none;color:var(--text);cursor:pointer;}

/* ═══ APP SHELL ═══ */
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.view{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0;opacity:0;transition:opacity 0.3s ease;}
.view.active{display:flex;opacity:1;}
.scroller{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.scroller::-webkit-scrollbar{display:none;}

/* ═══ HEADER (Minimal) ═══ */
.hdr{
  padding:calc(var(--safe-t) + 24px) 24px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;z-index:10;
}
.logo{font-size:16px;font-weight:600;letter-spacing:-0.5px;}
.hdr-r{display:flex;align-items:center;gap:20px;}
.hdr-btn{font-size:14px;font-weight:500;color:var(--text-muted);transition:color 0.2s;}
.hdr-btn:active{color:var(--text);}
.hdr-btn.active{color:var(--text);font-weight:600;}

/* ═══ LIBRARY (Editorial List) ═══ */
.lib-list{padding:24px 24px 100px;display:flex;flex-direction:column;gap:48px;}
.lib-item{
  cursor:pointer;
  transition:transform 0.2s cubic-bezier(0.2,0,0,1), opacity 0.2s;
}
.lib-item:active{transform:scale(0.98);opacity:0.6;}
.lib-title{
  font-family:var(--font-read);
  font-size:36px;line-height:1.1;font-weight:400;letter-spacing:-1px;
  margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.lib-meta{
  font-size:12px;font-weight:500;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:1px;
}
.lib-prog{margin-top:12px;height:1px;background:var(--text-faint);width:100px;position:relative;}
.lib-prog-fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent);transition:width 0.4s;}

/* ═══ READER (Strict Pagination) ═══ */
#view-reader{background:var(--bg);}
.rdr-top{
  padding:calc(var(--safe-t) + 16px) 24px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;font-size:12px;font-weight:500;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:1px;
}
.rdr-back{cursor:pointer;padding:10px 10px 10px 0;margin-left:-10px;}
.rdr-tools{display:flex;align-items:center;gap:16px;}

.rdr-wrapper{
  flex:1;width:100vw;overflow:hidden;position:relative;
}
.rdr-content{
  height:calc(100dvh - var(--safe-t) - var(--safe-b) - 120px);
  /* 32px padding each side = 64px gap */
  column-width: calc(100vw - 64px);
  column-gap:64px;
  padding:0 32px;
  /* Typography */
  font-family:var(--font-read);
  font-size:22px;line-height:1.7;
  color:var(--text);
  /* Animation */
  transition:transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}
.rdr-content p{margin-bottom:1.5em;text-align:justify;}
.rdr-content b{font-weight:700;} /* For Bionic Reading */

/* Tap Zones */
.tap-zone{position:absolute;top:0;bottom:0;z-index:20;}
.tap-prev{left:0;width:30%;}
.tap-next{right:0;width:70%;}

/* Bottom Progress */
.rdr-bot{
  padding:16px 24px calc(var(--safe-b) + 16px);
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--text-muted);
}
.rdr-progress-bar{
  flex:1;margin:0 24px;height:1px;background:var(--text-faint);position:relative;
}
.rdr-progress-fill{
  position:absolute;left:0;top:-1px;bottom:-1px;background:var(--accent);transition:width 0.3s;
}

/* ═══ Aa SETTINGS SHEET ═══ */
.sheet-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.sheet-backdrop.show{opacity:1;pointer-events:auto;}
.sheet{
  position:fixed;bottom:0;left:0;right:0;background:var(--bg);
  border-top:1px solid var(--text-faint);
  padding:24px 24px calc(var(--safe-b) + 24px);
  z-index:101;
  transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.2,0,0,1);
}
.sheet.open{transform:translateY(0);}
.sheet-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.sheet-row:last-child{margin-bottom:0;}
.sheet-lbl{font-size:12px;text-transform:uppercase;letter-spacing:1px;font-weight:600;color:var(--text-muted);}
.btn-group{display:flex;background:transparent;border:1px solid var(--text-faint);border-radius:100px;overflow:hidden;}
.btn-group button{padding:10px 20px;font-size:14px;font-weight:500;border-right:1px solid var(--text-faint);}
.btn-group button:last-child{border-right:none;}
.btn-group button.active{background:var(--text);color:var(--bg);}
.toggle-btn{padding:8px 16px;border-radius:100px;border:1px solid var(--text-faint);font-size:14px;font-weight:500;}
.toggle-btn.active{background:var(--text);color:var(--bg);border-color:var(--text);}

/* ═══ STATS (Minimal) ═══ */
.stats-wrap{padding:24px;display:flex;flex-direction:column;gap:40px;}
.stat-huge{font-size:72px;font-weight:300;letter-spacing:-3px;line-height:1;margin-bottom:8px;}
.stat-lbl{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:500;}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--text-faint);}
.set-row:last-child{border:none;}
.quotes-sec{margin-top:20px;}
.quote-card{
  padding:16px 0;border-bottom:1px solid var(--text-faint);
  font-family:var(--font-read);font-size:18px;line-height:1.6;
}
.quote-src{font-size:12px;font-family:var(--font-ui);color:var(--text-muted);margin-top:8px;}

/* ═══ UTILS ═══ */
.loader{font-size:14px;color:var(--text-muted);padding:48px 24px;text-align:center;}
.toast{position:fixed;bottom:calc(40px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);padding:12px 24px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.quote-btn{
  position:fixed;bottom:calc(100px + var(--safe-b));left:50%;transform:translateX(-50%);
  background:var(--accent);color:var(--bg);padding:12px 24px;border-radius:100px;
  font-weight:600;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,0.3);
  z-index:150;display:none;
}
  </style>
</head>
<body>
<div id="app">
  <div class="toast" id="toast"></div>
  <button class="quote-btn" id="saveQuoteBtn" onclick="App.saveQuote()">Save Quote</button>

  <!-- HEADER -->
  <div class="hdr" id="mainHdr">
    <div class="logo">ZenHabit</div>
    <div class="hdr-r">
      <button class="hdr-btn active" id="nav-library" onclick="App.go('library')">Library</button>
      <button class="hdr-btn" id="nav-stats" onclick="App.go('stats')">Stats</button>
    </div>
  </div>

  <!-- LIBRARY -->
  <div class="view active" id="view-library">
    <div class="scroller">
      <div class="lib-list" id="libList">
        <div class="loader">Loading classic library...</div>
      </div>
    </div>
  </div>

  <!-- READER -->
  <div class="view" id="view-reader">
    <div class="rdr-top">
      <div class="rdr-back" onclick="App.go('library')">← Back</div>
      <div id="rTimeEst">~ min</div>
      <div class="rdr-tools">
        <button class="hdr-btn" onclick="App.toggleSettings()">Aa</button>
      </div>
    </div>
    
    <div class="rdr-wrapper">
      <div class="tap-zone tap-prev" onclick="App.turnPage(-1)"></div>
      <div class="tap-zone tap-next" onclick="App.turnPage(1)"></div>
      <div class="rdr-content" id="rdrContent"></div>
    </div>

    <div class="rdr-bot">
      <div id="rPageLbl">1 / 1</div>
      <div class="rdr-progress-bar"><div class="rdr-progress-fill" id="rProgFill" style="width:0%"></div></div>
      <div id="rPctLbl">0%</div>
    </div>
  </div>

  <!-- Aa SETTINGS SHEET -->
  <div class="sheet-backdrop" id="sheetBd" onclick="App.toggleSettings()"></div>
  <div class="sheet" id="settingsSheet">
    <div class="sheet-row">
      <div class="sheet-lbl">Theme</div>
      <div class="btn-group">
        <button id="tm-light" onclick="App.setTheme('light')">Light</button>
        <button id="tm-sepia" onclick="App.setTheme('sepia')">Sepia</button>
        <button id="tm-dark" onclick="App.setTheme('dark')">Dark</button>
        <button id="tm-eink" onclick="App.setTheme('eink')">E-Ink</button>
      </div>
    </div>
    <div class="sheet-row">
      <div class="sheet-lbl">Font</div>
      <div class="btn-group">
        <button id="ft-serif" onclick="App.setFont('serif')">Serif</button>
        <button id="ft-sans" onclick="App.setFont('sans')">Sans</button>
        <button id="ft-mono" onclick="App.setFont('mono')">Mono</button>
      </div>
    </div>
    <div class="sheet-row">
      <div class="sheet-lbl">Size</div>
      <div class="btn-group">
        <button onclick="App.setSize(-2)">A-</button>
        <button onclick="App.setSize(2)">A+</button>
      </div>
    </div>
    <div class="sheet-row">
      <div class="sheet-lbl">Bionic Reading</div>
      <button class="toggle-btn" id="btn-bionic" onclick="App.toggleBionic()">Off</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="view" id="view-stats">
    <div class="scroller">
      <div class="stats-wrap">
        <div>
          <div class="stat-huge" id="stStreak">0</div>
          <div class="stat-lbl">Day Streak</div>
        </div>
        <div>
          <div class="stat-huge" id="stPages">0</div>
          <div class="stat-lbl">Pages Read</div>
        </div>
        <div>
          <div class="stat-huge" id="stWpm">200</div>
          <div class="stat-lbl">Avg. Words Per Minute</div>
        </div>
        
        <div class="quotes-sec">
          <div class="stat-lbl" style="margin-bottom:16px;">Saved Quotes</div>
          <div id="quotesList"></div>
        </div>

        <div style="margin-top:20px;">
          <div class="set-row">
            <div class="stat-lbl">Refresh Library</div>
            <button class="hdr-btn" onclick="App.fetchBooks()">Sync</button>
          </div>
          <div class="set-row">
            <div class="stat-lbl">Clear Cache</div>
            <button class="hdr-btn" onclick="App.clearCache()">Reset Books</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── PWA REGISTRATION ── */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW setup failed', err));
}

/* ── CONFIG ── */
const GH_OWNER='PhaNtoM-GHosT-11101', GH_REPO='reading-habit-app', GH_PATH='books';
const GH_API=`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`;

/* ── STATE ── */
let S={
  books:{},          // filename → {title,text}
  progress:{},       // filename → curPage
  quotes:[],         // {text, src}
  stats:{streak:0,pages:0,lastDay:null,days:[],wpm:200},
  settings:{theme:'dark',active:null,font:'serif',fontSize:22,bionic:false}
};
let ghFiles=[];
let totalPages=1;
let pageStartTime=0;
let currentSelection='';

function saveState(){try{localStorage.setItem('zh2',JSON.stringify(S));}catch(e){}}
function loadState(){try{const raw=localStorage.getItem('zh2');if(raw){const p=JSON.parse(raw);if(p.settings)S.settings={...S.settings,...p.settings};if(p.stats)S.stats={...S.stats,...p.stats};if(p.books)S.books=p.books;if(p.progress)S.progress=p.progress;if(p.quotes)S.quotes=p.quotes;}}catch(e){}}
const today=()=>new Date().toISOString().slice(0,10);
function toast(msg,ms=2500){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),ms);
}

function updateStreak(){
  const t=today(),days=S.stats.days||[];
  if(!days.includes(t))days.push(t);
  S.stats.days=days;S.stats.lastDay=t;
  let str=0,d=new Date();
  while(true){const ds=d.toISOString().slice(0,10);if(days.includes(ds)){str++;d.setDate(d.getDate()-1);}else break;}
  S.stats.streak=str;saveState();
}

/* ── EPUB PARSER ── */
async function parseEpub(buf){
  const zip=await JSZip.loadAsync(buf);
  let opfPath='';
  const cont=await zip.file('META-INF/container.xml')?.async('string');
  if(cont){const m=cont.match(/full-path="([^"]+\.opf)"/i);if(m)opfPath=m[1];}
  if(!opfPath)opfPath=Object.keys(zip.files).find(f=>f.endsWith('.opf'))||'';
  const opfDir=opfPath.includes('/')?opfPath.slice(0,opfPath.lastIndexOf('/')+1):'';
  let spine=[];
  if(opfPath){
    const opf=await zip.file(opfPath)?.async('string')||'';
    const items={};let m,mr=/<item[^>]+id="([^"]+)"[^>]+href="([^"]+)"[^>]*>/gi;
    while((m=mr.exec(opf))!==null)items[m[1]]=m[2];
    const sr=/<itemref[^>]+idref="([^"]+)"/gi;
    while((m=sr.exec(opf))!==null){const h=items[m[1]];if(h)spine.push(opfDir+h);}
  }
  if(!spine.length)spine=Object.keys(zip.files).filter(f=>/\.(html|xhtml|htm)$/i.test(f)).sort();
  let out='';
  for(const fp of spine){
    const f=zip.file(fp)||zip.file(fp.replace(/^\//,''));if(!f)continue;
    const html=await f.async('string');
    const clean=html
      .replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'').replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
      .replace(/<br\s*\/?>/gi,'\n').replace(/<\/p>/gi,'\n\n').replace(/<[^>]+>/g,' ')
      .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'")
      .replace(/[ \t]+/g,' ').replace(/\n{3,}/g,'\n\n').trim();
    if(clean.length>50)out+=clean+'\n\n';
  }
  return out.trim();
}

function cleanTitle(fn){return fn.replace(/\.epub$/i,'').replace(/[-_]/g,' ').trim();}

/* ── BIONIC READING ENGINE ── */
function applyBionic(text) {
  if(!S.settings.bionic) return text;
  return text.split(/(\s+)/).map(word => {
    if(!word.trim()) return word;
    const len = word.length;
    if(len === 1) return `<b>${word}</b>`;
    const mid = Math.ceil(len / 2);
    return `<b>${word.slice(0,mid)}</b>${word.slice(mid)}`;
  }).join('');
}

/* ── APP LOGIC ── */
const App={
  go(view){
    if(view==='reader') document.getElementById('mainHdr').style.display='none';
    else document.getElementById('mainHdr').style.display='flex';
    
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.querySelectorAll('.hdr-btn').forEach(b=>b.classList.remove('active'));
    
    document.getElementById('view-'+view).classList.add('active');
    const navBtn=document.getElementById('nav-'+view);
    if(navBtn)navBtn.classList.add('active');
    
    if(view==='library') this.renderLib();
    if(view==='stats') this.renderStats();
  },

  async fetchBooks(){
    const list=document.getElementById('libList');
    list.innerHTML='<div class="loader">Syncing library...</div>';
    try{
      const res=await fetch(GH_API,{headers:{'Accept':'application/vnd.github.v3+json'}});
      if(!res.ok)throw new Error('API Error');
      ghFiles=(await res.json()).filter(f=>f.name.toLowerCase().endsWith('.epub'));
      this.renderLib();
    }catch(e){
      list.innerHTML=`<div class="loader">Failed to load. <button onclick="App.fetchBooks()" style="text-decoration:underline">Retry</button></div>`;
    }
  },

  renderLib(){
    const list=document.getElementById('libList');
    if(!ghFiles.length){
      list.innerHTML='<div class="loader">No books found in /books/</div>';
      return;
    }
    list.innerHTML='';
    ghFiles.forEach(f=>{
      const title=cleanTitle(f.name);
      const cached=!!S.books[f.name];
      const prog=S.progress[f.name]||0;
      const metaStr = cached ? 'Stored Locally' : 'Tap to Download';
      
      const el=document.createElement('div');
      el.className='lib-item';
      el.onclick=()=>this.bookTap(f.name,title,f.download_url);
      el.innerHTML=`
        <div class="lib-title">${title}</div>
        <div class="lib-meta">${metaStr}</div>
        ${cached && prog>0 ? `<div class="lib-prog"><div class="lib-prog-fill" style="width:100%"></div></div>` : ''}
      `;
      list.appendChild(el);
    });
  },

  async bookTap(fn,title,url){
    S.settings.active=fn;
    if(S.books[fn]){
      saveState();this.openReader();
    }else{
      toast('Downloading...');
      try{
        const res=await fetch(url);
        const text=await parseEpub(await res.arrayBuffer());
        if(!text)throw new Error('Empty');
        S.books[fn]={title,text};
        S.progress[fn]=0;
        saveState();toast('Ready');this.renderLib();this.openReader();
      }catch(e){toast('Failed: ' + e.message);}
    }
  },

  openReader(){
    this.go('reader');
    this.applySettingsUI();
    const fn=S.settings.active;
    const book=S.books[fn];
    document.getElementById('rTitle').textContent=book.title;
    const content=document.getElementById('rdrContent');
    
    // Parse and apply Bionic if needed
    const paragraphs = book.text.split('\n\n').filter(p=>p.trim().length>0);
    content.innerHTML = paragraphs.map(p => `<p>${applyBionic(p)}</p>`).join('');
    
    // Reset transform to measure
    content.style.transform='translateX(0)';
    
    // Wait for DOM to render the new text size/font
    requestAnimationFrame(()=>{
      setTimeout(()=>{
        totalPages = Math.max(1, Math.ceil(content.scrollWidth / window.innerWidth));
        let cur = Math.min(S.progress[fn]||0, totalPages-1);
        S.progress[fn] = cur; saveState();
        this.updatePageUI();
        pageStartTime = Date.now();
      }, 50); // slight delay ensures layout is complete
    });
  },

  turnPage(dir){
    const fn=S.settings.active;
    let cur=S.progress[fn]||0;
    const next=cur+dir;
    
    // WPM Tracking logic
    if (dir > 0 && pageStartTime > 0) {
      const elapsedSec = (Date.now() - pageStartTime) / 1000;
      // Rough estimate of words on a page based on total length / total pages
      const bookWords = S.books[fn].text.split(/\s+/).length;
      const wordsOnPage = bookWords / totalPages;
      
      // If they spent at least 5 seconds reading (not just spam clicking)
      if (elapsedSec > 5) {
        const pageWpm = (wordsOnPage / elapsedSec) * 60;
        // Exponential moving average to smooth it out
        S.stats.wpm = Math.round((S.stats.wpm * 0.8) + (pageWpm * 0.2));
        // clamp to sane values
        S.stats.wpm = Math.max(50, Math.min(800, S.stats.wpm));
      }
    }
    
    if(next>=0 && next<totalPages){
      S.progress[fn]=next;
      if(dir>0){
        S.stats.pages++;
        updateStreak();
      }
      saveState();
      this.updatePageUI();
      pageStartTime = Date.now();
    }else if(next>=totalPages){
      toast('Book Completed!');
    }
  },

  updatePageUI(){
    const fn=S.settings.active;
    const cur=S.progress[fn]||0;
    const content=document.getElementById('rdrContent');
    content.style.transform = `translateX(calc(-100vw * ${cur}))`;
    
    document.getElementById('rPageLbl').textContent=`${cur+1} / ${totalPages}`;
    const pct = Math.round(((cur+1)/totalPages)*100);
    document.getElementById('rProgFill').style.width=pct+'%';
    document.getElementById('rPctLbl').textContent=pct+'%';
    
    // Update Time Est
    const wordsLeft = (totalPages - cur) * (S.books[fn].text.split(/\s+/).length / totalPages);
    const minsLeft = Math.max(1, Math.ceil(wordsLeft / (S.stats.wpm||200)));
    document.getElementById('rTimeEst').textContent=`~${minsLeft} min left`;
  },

  /* ── SETTINGS (Aa) ── */
  toggleSettings(){
    const s=document.getElementById('settingsSheet');
    const b=document.getElementById('sheetBd');
    if(s.classList.contains('open')){
      s.classList.remove('open');b.classList.remove('show');
    }else{
      s.classList.add('open');b.classList.add('show');
    }
  },
  
  applySettingsUI(){
    // Fonts
    let fFam = "'Lora', Georgia, serif";
    if(S.settings.font==='sans') fFam = "'Inter', sans-serif";
    if(S.settings.font==='mono') fFam = "'JetBrains Mono', monospace";
    document.documentElement.style.setProperty('--font-read', fFam);
    document.getElementById('rdrContent').style.fontSize = (S.settings.fontSize || 22) + 'px';
    
    // Theme colors
    let tc = '#000000';
    if(S.settings.theme==='light' || S.settings.theme==='eink') tc='#ffffff';
    if(S.settings.theme==='sepia') tc='#f4ecd8';
    document.documentElement.setAttribute('data-theme',S.settings.theme);
    document.getElementById('themeColor').content = tc;
    
    // UI active states
    document.querySelectorAll('#settingsSheet .active').forEach(e=>e.classList.remove('active'));
    document.getElementById('tm-'+S.settings.theme)?.classList.add('active');
    document.getElementById('ft-'+S.settings.font)?.classList.add('active');
    
    const bBtn = document.getElementById('btn-bionic');
    if(S.settings.bionic) { bBtn.classList.add('active'); bBtn.textContent='On'; }
    else { bBtn.classList.remove('active'); bBtn.textContent='Off'; }
  },

  setTheme(t){ S.settings.theme=t; saveState(); this.applySettingsUI(); },
  setFont(f){ S.settings.font=f; saveState(); this.applySettingsUI(); this.openReader(); /* recalc pages */ },
  setSize(d){ 
    S.settings.fontSize = Math.max(14, Math.min(48, S.settings.fontSize + d)); 
    saveState(); this.applySettingsUI(); this.openReader(); 
  },
  toggleBionic(){ S.settings.bionic = !S.settings.bionic; saveState(); this.applySettingsUI(); this.openReader(); },

  /* ── QUOTES ── */
  saveQuote(){
    if(!currentSelection) return;
    const fn = S.settings.active;
    const bookTitle = S.books[fn]?.title || 'Unknown';
    if(!S.quotes) S.quotes = [];
    S.quotes.push({ text: currentSelection, src: bookTitle });
    saveState();
    toast('Quote Saved!');
    document.getElementById('saveQuoteBtn').style.display='none';
    if (window.getSelection) window.getSelection().removeAllRanges();
  },

  renderStats(){
    document.getElementById('stStreak').textContent=S.stats.streak||0;
    document.getElementById('stPages').textContent=S.stats.pages||0;
    document.getElementById('stWpm').textContent=S.stats.wpm||200;
    
    const qList = document.getElementById('quotesList');
    if(!S.quotes || S.quotes.length===0){
      qList.innerHTML='<div style="font-size:14px;color:var(--text-muted)">Highlight text while reading to save quotes here.</div>';
    }else{
      qList.innerHTML = [...S.quotes].reverse().map(q => `
        <div class="quote-card">
          "${q.text}"
          <div class="quote-src">— ${q.src}</div>
        </div>
      `).join('');
    }
  },

  clearCache(){
    if(!confirm('Delete all downloaded books?'))return;
    S.books={};S.progress={};S.settings.active=null;saveState();this.renderLib();
  }
};

/* ── SELECTION LISTENER ── */
document.addEventListener('selectionchange', () => {
  const btn = document.getElementById('saveQuoteBtn');
  const sel = window.getSelection().toString().trim();
  if(sel.length > 5 && document.getElementById('view-reader').classList.contains('active')){
    currentSelection = sel;
    btn.style.display = 'block';
  } else {
    btn.style.display = 'none';
  }
});

/* ── BOOT ── */
window.onload=()=>{
  loadState();
  if(!S.quotes) S.quotes=[];
  App.applySettingsUI();
  App.fetchBooks();
  App.go('library');
  
  // Handle resize for reader recalibration
  let resizeTimer;
  window.addEventListener('resize',()=>{
    clearTimeout(resizeTimer);
    resizeTimer=setTimeout(()=>{
      if(document.getElementById('view-reader').classList.contains('active')){
        App.openReader(); // recalc totalPages
      }
    },300);
  });
};
</script>
</body>
</html>
